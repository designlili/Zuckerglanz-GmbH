<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Zuckerglanz GmbH – Power BI Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #fff5fa;
            color: #333333;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            color: #8f3f70;
        }

        .beschreibung {
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .dashboard {
            width: 100%;
            padding: 12px;
            background-color: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.12);
        }

        .dashboard iframe {
            display: block;
            width: 100%;
            height: 720px;
            border: none;
            border-radius: 10px;
        }

        @media (max-width: 800px) {
            body {
                padding: 15px;
            }

            .dashboard iframe {
                height: 600px;
            }
        }
    </style>
</head>

<body>

    <main class="container">

        <h1>Zuckerglanz GmbH</h1>

        <p class="beschreibung">
            Interaktives Power-BI-Praxisprojekt zur Analyse von Umsatz,
            Gewinn, Kunden, Produkten und Regionen.
        </p>

        <div class="dashboard">

      

        </div>

    </main>

</body>

</html>
